<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <!-- This starts the AR engine -->
    <a-scene mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/examples/image-tracking/assets/card-example/card.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- This is your floating gallery. We use a "card" as a trigger for this demo -->
      <a-entity mindar-image-target="targetIndex: 0">
        <!-- Image 1 -->
        <a-image src="image1.jpg" position="-1 1 0" width="1" height="1"></a-image>
        <!-- Image 2 -->
        <a-image src="image2.jpg" position="0 1 0" width="1" height="1"></a-image>
        <!-- Image 3 -->
        <a-image src="image3.jpg" position="1 1 0" width="1" height="1"></a-image>
        <!-- Image 4 -->
        <a-image src="image4.jpg" position="-0.5 0 0" width="1" height="1"></a-image>
        <!-- Image 5 -->
        <a-image src="image5.jpg" position="0.5 0 0" width="1" height="1"></a-image>
      </a-entity>
    </a-scene>
  </body>
</html>
