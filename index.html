<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <!-- We are using A-Frame's built-in WebXR for "No Marker" tracking -->
  </head>
  <body style="margin: 0; overflow: hidden;">

    <a-scene xr-mode-ui="enabled: true" renderer="colorManagement: true;">
      
      <!-- Assets: This tells the browser to load your images first -->
      <a-assets>
        <img id="image1" src="1.jpg">
        <img id="image2" src="2.jpg">
        <img id="image3" src="3.jpg">
        <img id="image4" src="4.jpg">
        <img id="image5" src="5.jpg">
        <img id="image6" src="6.jpg">
      </a-assets>

      <a-camera position="0 1.6 0"></a-camera>

      <!-- THE MUSEUM LAYOUT -->
      <!-- We place images in a circle around the starting point (0,0,0) -->

      <!-- Center Front -->
      <a-image src="#img1" position="0 1.6 -3" width="1.5" height="2"></a-image>

      <!-- Front Left (Angled) -->
      <a-image src="#img2" position="-2.5 1.6 -2" rotation="0 45 0" width="1.5" height="1.5"></a-image>

      <!-- Front Right (Angled) -->
      <a-image src="#img3" position="2.5 1.6 -2" rotation="0 -45 0" width="1.5" height="1.5"></a-image>

      <!-- Far Left Wall -->
      <a-image src="#img4" position="-4 1.6 1" rotation="0 90 0" width="2" height="1.5"></a-image>

      <!-- Far Right Wall -->
      <a-image src="#img5" position="4 1.6 1" rotation="0 -90 0" width="2" height="1.5"></a-image>

      <!-- Behind the user -->
      <a-image src="#img6" position="0 1.6 3" rotation="0 180 0" width="1.5" height="1.5"></a-image>

      <!-- Soft Museum Lighting -->
      <a-light type="ambient" intensity="0.7"></a-light>
      <a-light type="directional" position="0 5 2" intensity="0.5"></a-light>

    </a-scene>

    <div style="position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 999;">
        <button onclick="document.querySelector('a-scene').enterAR()" style="padding: 15px 25px; border-radius: 30px; border: none; background: #007bff; color: white; font-size: 18px; font-weight: bold; cursor: pointer;">
            ENTER MUSEUM
        </button>
    </div>
  </body>
</html>
