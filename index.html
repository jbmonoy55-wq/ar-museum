<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- These scripts are essential for iPhone AR -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      #ar-instructions {
        position: fixed; top: 10px; width: 100%; text-align: center;
        z-index: 10; color: white; background: rgba(0,0,0,0.5); font-family: sans-serif;
      }
    </style>
  </head>
  <body>

    <div id="ar-instructions">Point camera at a flat surface and move slowly</div>

    <!-- The "uiScanning: no" part is what removes the marquee tool you hated! -->
    <a-scene mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/examples/image-tracking/assets/card-example/card.mind; autoStart: true; uiLoading: no; uiScanning: no;" 
             embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- The Gallery Group -->
      <!-- On iPhone, these will appear once the camera activates -->
      <a-entity id="museum-group" position="0 0 -2">
        
        <a-image src="1.jpg" position="0 1.5 0" width="1" height="1.5"></a-image>
        <a-image src="2.jpg" position="-1.5 1.5 0.5" rotation="0 45 0" width="1" height="1"></a-image>
        <a-image src="3.jpg" position="1.5 1.5 0.5" rotation="0 -45 0" width="1" height="1"></a-image>
        <a-image src="4.jpg" position="-2.5 1.2 2" rotation="0 90 0" width="1.5" height="1"></a-image>
        <a-image src="5.jpg" position="2.5 1.2 2" rotation="0 -90 0" width="1.5" height="1"></a-image>

      </a-entity>

      <a-light type="ambient" intensity="1"></a-light>
    </a-scene>
  </body>
</html>
